version: '3.8'

services:
  # Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: eai_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123

  # Database untuk SIAKAD (MySQL)
  siakad-db:
    image: mysql:8.0
    container_name: db_siakad_mysql
    environment:
      MYSQL_DATABASE: db_siakad
      MYSQL_USER: siakad_user
      MYSQL_PASSWORD: siakad_pass
      MYSQL_ROOT_PASSWORD: root_siakad_123
    ports:
      - "3307:3306"

  # Database untuk Finance (PostgreSQL)
  finance-db:
    image: postgres:15
    container_name: db_finance_postgres
    environment:
      POSTGRES_DB: db_finance
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5433:5432"

  # Database untuk Library (MySQL)
  library-db:
    image: mysql:8.0
    container_name: db_library_mysql
    environment:
      MYSQL_DATABASE: db_library
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_pass
      MYSQL_ROOT_PASSWORD: root_library_123
    ports:
      - "3308:3306"

  # Aplikasi Layanan Utama (SIAKAD) - Bagian Aditya
  siakad-service:
    build: ./apps/siakad-service
    container_name: app_siakad
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://siakad_user:siakad_pass@siakad-db:3306/db_siakad
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - siakad-db